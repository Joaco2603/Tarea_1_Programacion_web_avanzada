<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teck Site</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="site-header">
        <h1>Teck Site</h1>
        <form id="searchForm" class="search-form" role="search" aria-label="Buscar productos">
            <label for="searchInput">Buscar:</label>
            <input id="searchInput" name="search" type="search" placeholder="Nombre o categoría" autocomplete="off">
            <label for="categorySelect">Categoría:</label>
            <select id="categorySelect" name="category">
                <option value="">Todas</option>
            </select>
        </form>
    </header>

    <main class="container">
        <section id="products-section" aria-label="Listado de productos">
            <div id="products" class="products-grid" aria-live="polite"></div>
        </section>
    </main>

    <div id="productModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-backdrop" data-close="true"></div>
        <div class="modal-dialog" role="document">
            <button type="button" class="modal-close" aria-label="Cerrar" data-close="true">×</button>
            <div class="modal-content">
                <img class="modal-image" src="" alt="">
                <div class="modal-body">
                    <h2 id="modalTitle" class="modal-title"></h2>
                    <div class="modal-category"></div>
                    <p class="modal-desc"></p>
                    <div class="modal-row">
                        <div class="modal-price"></div>
                        <div class="modal-badge badge"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer" role="contentinfo">
        <div class="container">&copy; Tienda Tech - Catálogo dinámico</div>
    </footer>

    <script src="js/main.js" defer></script>
</body>
</html>
